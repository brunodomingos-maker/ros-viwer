<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Run of Show — Live</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#ffffff;--s1:#f8f9fc;--s2:#f0f2f9;--border:#e2e6f0;
  --text:#1a1d2e;--muted:#6b7280;--blue:#4a7cf7;
  --amber:#f5a623;--cyan:#0891b2;--purple:#7c3aed;--green:#059669;
  --red:#dc2626;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#topbar{background:#fff;border-bottom:2px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
#topbar h1{font-size:16px;font-weight:700;color:var(--text)}
#clock{font-size:14px;font-weight:600;color:var(--blue);font-variant-numeric:tabular-nums}
#status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
#dot{width:8px;height:8px;border-radius:50%;background:#10b981;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#days{background:var(--s1);border-bottom:1px solid var(--border);display:flex;gap:4px;padding:8px 16px;overflow-x:auto}
.day-tab{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;color:var(--muted);white-space:nowrap}
.day-tab.active{background:#fff;border-color:var(--blue);color:var(--blue);box-shadow:0 1px 4px rgba(74,124,247,.15)}
#wrap{padding:0;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
thead tr{background:var(--s2);border-bottom:2px solid var(--border)}
th{padding:8px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);text-align:left;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:var(--s1)}
tbody tr.active-cue{background:#eff6ff;border-left:3px solid var(--blue)}
tbody tr.section-row{background:var(--s2);font-weight:700}
td{padding:8px 10px;font-size:13px;vertical-align:top}
td.num{color:var(--muted);font-size:11px;width:36px}
td.name{font-weight:600;max-width:220px}
td.speaker-sub{font-size:11px;color:var(--muted);margin-top:2px}
td.time{font-variant-numeric:tabular-nums;font-size:12px;white-space:nowrap}
td.dur{font-variant-numeric:tabular-nums;font-size:12px;color:var(--muted)}
.dept-pill{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;border:1px solid;margin:1px}
.col-audio{color:var(--amber)}
.col-micro{color:var(--cyan)}
.col-video{color:var(--purple)}
.col-lights{color:var(--blue)}
.col-stage{color:var(--green)}
td.col-audio{color:var(--amber);font-weight:600;font-size:12px}
td.col-micro{color:var(--cyan);font-weight:600;font-size:12px}
td.col-video{color:var(--purple);font-weight:600;font-size:12px}
td.col-lights{color:var(--blue);font-weight:600;font-size:12px}
td.col-stage{color:var(--green);font-weight:600;font-size:12px}
td.screens{font-size:11px;color:var(--muted);max-width:160px}
td.notes{font-size:12px;color:var(--muted);max-width:180px}
.progress-bar{height:3px;background:var(--blue);border-radius:2px;transition:width 1s linear;margin-top:4px}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
#loading .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#err{display:none;text-align:center;padding:40px;color:var(--red)}
@media(max-width:768px){
  table{min-width:600px}
  th,td{padding:6px 8px;font-size:12px}
}
</style>
</head>
<body>

<div id="topbar">
  <h1 id="showName">Run of Show — Live</h1>
  <div id="status"><div id="dot"></div><span id="statusTxt">Connecting...</span></div>
  <div id="clock">--:--:--</div>
</div>

<div id="days"></div>
<div id="loading"><div class="spinner"></div><p style="color:var(--muted);font-size:14px">Loading show data...</p></div>
<div id="err"></div>
<div id="wrap" style="display:none"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>

<script>
var SHEET_ID = '';
var allDays = [];
var screenNames = ['Screen 1','Screen 2','Screen 3','Screen 4'];
var currentDay = 0;
var pollTimer = null;

function getParams() {
  var p = {};
  var q = window.location.search.slice(1).split('&');
  for (var i=0; i<q.length; i++) { var kv=q[i].split('='); if(kv[0]) p[kv[0]]=decodeURIComponent(kv[1]||''); }
  return p;
}

function init() {
  var params = getParams();
  SHEET_ID = params['sheet'] || '1JlKPuTyIIQJqtj6QExMbqacx9txMbUXQ32xfJj10z04';
  if (!SHEET_ID) { showErr('No sheet ID. Use ?sheet=SHEET_ID in the URL.'); return; }
  fetchData();
  setInterval(fetchData, 5000);
  setInterval(updateClock, 1000);
  updateClock();
}

function fetchData() {
  // Use export CSV - works without CORS issues for public sheets
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv&sheet=data&t=' + Date.now();
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onload = function() {
    if (xhr.status === 200) {
      processCSV(xhr.responseText);
    } else {
      // Fallback: try gviz json
      fetchGviz();
    }
  };
  xhr.onerror = function() { fetchGviz(); };
  xhr.send();
}

function fetchGviz() {
  var cbName = '_cb_' + Date.now();
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=data&callback=' + cbName;
  window[cbName] = function(resp) {
    try {
      delete window[cbName];
      var rows = resp.table.rows;
      if (rows && rows[0] && rows[0].c && rows[0].c[0]) {
        var raw = rows[0].c[0].v || '';
        processJSON(raw);
      }
    } catch(e) { showErr('Failed to parse data: ' + e.message); }
  };
  var s = document.createElement('script');
  s.src = url;
  s.onerror = function() { showErr('Cannot load sheet. Make sure it is publicly shared.'); };
  document.head.appendChild(s);
}

function processCSV(csv) {
  // CSV has one cell A1 with JSON
  var lines = csv.split('\n');
  var raw = lines[0] || '';
  // Remove CSV quoting if present
  if (raw.charAt(0) === '"') {
    raw = raw.slice(1);
    if (raw.charAt(raw.length-1) === '"') raw = raw.slice(0,-1);
    raw = raw.replace(/""/g, '"');
  }
  processJSON(raw);
}

function processJSON(raw) {
  try {
    if (!raw || raw.length < 10) { showErr('Sheet is empty. Save the show in RunOfShow to publish data.'); return; }
    var data = JSON.parse(raw);
    if (data.screenNames) screenNames = data.screenNames;
    if (data.days && Array.isArray(data.days)) {
      allDays = data.days;
    } else if (data.rows) {
      allDays = [{name:'Day 1', rows: data.rows}];
    } else {
      allDays = [{name:'Day 1', rows:[]}];
    }
    if (data.evtData && data.evtData.name) {
      document.getElementById('showName').textContent = data.evtData.name + ' — Live';
    }
    document.getElementById('statusTxt').textContent = 'Live';
    document.getElementById('dot').style.background = '#10b981';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('err').style.display = 'none';
    document.getElementById('wrap').style.display = 'block';
    buildDayTabs();
    render();
  } catch(e) {
    showErr('Data parse error: ' + e.message + ' (raw: ' + raw.slice(0,100) + ')');
  }
}

function showErr(msg) {
  document.getElementById('loading').style.display = 'none';
  var el = document.getElementById('err');
  el.style.display = 'block';
  el.innerHTML = '<p style="font-size:16px;margin-bottom:8px">⚠️ ' + msg + '</p>';
  document.getElementById('statusTxt').textContent = 'Error';
  document.getElementById('dot').style.background = '#ef4444';
}

function buildDayTabs() {
  var c = document.getElementById('days');
  c.innerHTML = '';
  for (var i=0; i<allDays.length; i++) {
    var t = document.createElement('div');
    t.className = 'day-tab' + (i===currentDay?' active':'');
    t.textContent = allDays[i].name || ('Day '+(i+1));
    t.setAttribute('data-i', i);
    t.onclick = function(){ currentDay = parseInt(this.getAttribute('data-i')); buildDayTabs(); render(); };
    c.appendChild(t);
  }
}

function render() {
  var rows = (allDays[currentDay] && allDays[currentDay].rows) || [];
  var thead = document.getElementById('thead');
  var tbody = document.getElementById('tbody');
  thead.innerHTML = '<tr>' +
    '<th>#</th><th>Item</th><th>Dur.</th><th>Start</th>' +
    '<th class="col-audio">Audio</th><th class="col-micro">Micro</th>' +
    '<th class="col-video">Video</th><th class="col-lights">Lights</th>' +
    '<th class="col-stage">Stage</th>' +
    '<th>' + screenNames[0] + '</th><th>' + screenNames[1] + '</th>' +
    '<th>' + screenNames[2] + '</th><th>' + screenNames[3] + '</th>' +
    '<th>Notes</th></tr>';
  
  var html = '';
  for (var i=0; i<rows.length; i++) {
    var r = rows[i];
    if (r.type === 'section') {
      html += '<tr class="section-row"><td colspan="14" style="padding:8px 12px;font-size:12px;letter-spacing:.5px;color:var(--muted)">' + esc(r.name||'') + '</td></tr>';
      continue;
    }
    var active = isActive(r, rows, i);
    html += '<tr class="' + (active?'active-cue':'') + '">';
    html += '<td class="num">' + (i+1) + '</td>';
    html += '<td class="name"><div>' + esc(r.name||'') + '</div>' + (r.speaker?'<div class="speaker-sub">'+esc(r.speaker)+'</div>':'') + (active?'<div class="progress-bar" style="width:'+getProgress(r)+'%"></div>':'') + '</td>';
    html += '<td class="dur">' + esc(r.dur||'') + '</td>';
    html += '<td class="time">' + esc(r.start||'') + '</td>';
    html += '<td class="col-audio">' + esc(r.audio||'') + '</td>';
    html += '<td class="col-micro">' + esc(r.slides||'') + '</td>';
    html += '<td class="col-video">' + esc(r.video||'') + '</td>';
    html += '<td class="col-lights">' + esc(r.lights||'') + '</td>';
    html += '<td class="col-stage">' + esc(r.furniture||'') + '</td>';
    html += '<td class="screens">' + esc(r.sc0||'') + '</td>';
    html += '<td class="screens">' + esc(r.sc1||'') + '</td>';
    html += '<td class="screens">' + esc(r.sc2||'') + '</td>';
    html += '<td class="screens">' + esc(r.sc3||'') + '</td>';
    html += '<td class="notes">' + esc(r.comments||'') + '</td>';
    html += '</tr>';
  }
  tbody.innerHTML = html;
  
  // Auto-scroll to active
  var activeEl = tbody.querySelector('.active-cue');
  if (activeEl) activeEl.scrollIntoView({behavior:'smooth', block:'center'});
}

function isActive(row, rows, idx) {
  if (!row.start) return false;
  var now = new Date();
  var nowMins = now.getHours()*60 + now.getMinutes();
  var start = parseTimeMins(row.start);
  if (start < 0) return false;
  var dur = parseDurMins(row.dur) || 15;
  var end = start + dur;
  return nowMins >= start && nowMins < end;
}

function getProgress(row) {
  var now = new Date();
  var nowSecs = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
  var startSecs = parseTimeSecs(row.start);
  var durSecs = parseDurSecs(row.dur) || 900;
  if (startSecs < 0) return 0;
  var pct = ((nowSecs - startSecs) / durSecs) * 100;
  return Math.min(100, Math.max(0, pct));
}

function parseTimeMins(t) {
  if (!t) return -1;
  var m = t.match(/(\d+):(\d+)/);
  if (!m) return -1;
  return parseInt(m[1])*60 + parseInt(m[2]);
}

function parseTimeSecs(t) {
  if (!t) return -1;
  var m = t.match(/(\d+):(\d+):?(\d*)/);
  if (!m) return -1;
  return parseInt(m[1])*3600 + parseInt(m[2])*60 + (parseInt(m[3])||0);
}

function parseDurMins(d) {
  if (!d) return 0;
  var m = d.match(/(\d+):(\d+)/);
  if (m) return parseInt(m[1])*60 + parseInt(m[2]);
  var n = parseFloat(d);
  return isNaN(n) ? 0 : n;
}

function parseDurSecs(d) {
  if (!d) return 0;
  var m = d.match(/(\d+):(\d+):?(\d*)/);
  if (m) return parseInt(m[1])*3600 + parseInt(m[2])*60 + (parseInt(m[3])||0);
  return parseDurMins(d) * 60;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  var s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = h+':'+m+':'+s;
  if (document.getElementById('wrap').style.display !== 'none') render();
}

init();
</script>
</body>
</html>
