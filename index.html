<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Run of Show — Live</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--s1:#f8f9fc;--s2:#f0f2f9;--border:#e2e6f0;--text:#1a1d2e;--muted:#6b7280;--blue:#4a7cf7;--amber:#f5a623;--cyan:#0891b2;--purple:#7c3aed;--green:#059669}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
#topbar{background:#fff;border-bottom:2px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
#topbar h1{font-size:16px;font-weight:700}
#clock{font-size:14px;font-weight:600;color:var(--blue);font-variant-numeric:tabular-nums}
#status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
#dot{width:8px;height:8px;border-radius:50%;background:#10b981;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
#days{background:var(--s1);border-bottom:1px solid var(--border);display:flex;gap:4px;padding:8px 16px;overflow-x:auto}
.day-tab{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;color:var(--muted);white-space:nowrap}
.day-tab.active{background:#fff;border-color:var(--blue);color:var(--blue)}
#wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
thead tr{background:var(--s2);border-bottom:2px solid var(--border)}
th{padding:8px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);text-align:left;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:hover{background:var(--s1)}
tbody tr.active-cue{background:#eff6ff;border-left:3px solid var(--blue)}
tbody tr.section-row{background:var(--s2)}
td{padding:8px 10px;font-size:13px;vertical-align:top}
.col-audio{color:var(--amber);font-weight:600;font-size:12px}
.col-micro{color:var(--cyan);font-weight:600;font-size:12px}
.col-video{color:var(--purple);font-weight:600;font-size:12px}
.col-lights{color:var(--blue);font-weight:600;font-size:12px}
.col-stage{color:var(--green);font-weight:600;font-size:12px}
td.num{color:var(--muted);font-size:11px;width:36px}
td.name{font-weight:600;max-width:220px}
td.time{font-variant-numeric:tabular-nums;font-size:12px;white-space:nowrap}
td.dur{font-variant-numeric:tabular-nums;font-size:12px;color:var(--muted)}
td.screens{font-size:11px;color:var(--muted);max-width:140px}
td.notes{font-size:12px;color:var(--muted);max-width:160px}
.progress-bar{height:3px;background:var(--blue);border-radius:2px;margin-top:4px}
.speaker-sub{font-size:11px;color:var(--muted);margin-top:2px}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;text-align:center;padding:20px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>
<div id="topbar">
  <h1 id="showName">Run of Show — Live</h1>
  <div id="status"><div id="dot"></div><span id="statusTxt">Connecting...</span></div>
  <div id="clock">--:--:--</div>
</div>
<div id="days"></div>
<div id="loading"><div class="spinner"></div><p style="color:var(--muted);font-size:14px">Loading...</p></div>
<div id="wrap" style="display:none"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>

<script>
// CONFIG — filled automatically by Share button in RunOfShow
var GAS_URL = '';
var SHOW_ID = '';
var allDays = [];
var screenNames = ['Screen 1','Screen 2','Screen 3','Screen 4'];
var currentDay = 0;

function getParams() {
  var p = {};
  // Check query string
  var q = window.location.search.slice(1).split('&');
  for (var i=0; i<q.length; i++) {
    var kv = q[i].split('=');
    if (kv[0]) p[decodeURIComponent(kv[0])] = decodeURIComponent((kv[1]||'').replace(/\+/g,' '));
  }
  // Check hash
  var h = window.location.hash.slice(1).split('&');
  for (var i=0; i<h.length; i++) {
    var kv = h[i].split('=');
    if (kv[0]) p[decodeURIComponent(kv[0])] = decodeURIComponent((kv[1]||'').replace(/\+/g,' '));
  }
  return p;
}

function init() {
  var params = getParams();
  GAS_URL = params['gas'] || GAS_URL;
  SHOW_ID = params['show'] || SHOW_ID;

  if (!GAS_URL) {
    showMsg('⚙️', 'No GAS URL configured.', 
      'Use the Share button in RunOfShow to generate the correct viewer link.');
    return;
  }
  if (!SHOW_ID) {
    showMsg('⚙️', 'No show ID in URL.',
      'Use the Share button in RunOfShow to generate the correct viewer link.');
    return;
  }

  fetchData();
  setInterval(fetchData, 6000);
  setInterval(updateClock, 1000);
  updateClock();
}

function fetchData() {
  // Call GAS as JSONP — works cross-origin, no CORS issues
  var cbName = 'cb_' + Date.now();
  var url = GAS_URL + '?action=getData&show=' + encodeURIComponent(SHOW_ID) + '&callback=' + cbName + '&t=' + Date.now();
  
  window[cbName] = function(data) {
    try { delete window[cbName]; } catch(e){}
    if (data && data.ok) {
      onData(data);
    } else {
      showMsg('⚠️', 'Show not found: ' + SHOW_ID, 'Make sure the show exists and has been saved.');
    }
  };

  var s = document.createElement('script');
  s.src = url;
  s.onerror = function() {
    try { delete window[cbName]; } catch(e){}
    showMsg('⚠️', 'Cannot reach GAS.', 'Check that the GAS deploy is set to "Anyone" access.');
  };
  document.head.appendChild(s);
  setTimeout(function(){
    if (window[cbName]) {
      delete window[cbName];
      showMsg('⚠️', 'Request timed out.', 'GAS may be slow. Retrying...');
    }
  }, 15000);
}

function onData(data) {
  if (data.screenNames) screenNames = data.screenNames;
  if (data.days && Array.isArray(data.days)) {
    allDays = data.days;
  } else if (data.rows) {
    allDays = [{name:'Day 1', rows: data.rows}];
  }
  if (data.evtData && data.evtData.name) {
    document.getElementById('showName').textContent = data.evtData.name + ' — Live';
  }
  var total = 0;
  for (var i=0; i<allDays.length; i++) total += (allDays[i].rows||[]).length;
  document.getElementById('statusTxt').textContent = 'Live · ' + allDays.length + ' day' + (allDays.length>1?'s':'') + ' · ' + total + ' cues';
  document.getElementById('dot').style.background = '#10b981';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('wrap').style.display = 'block';
  buildDayTabs();
  render();
}

function showMsg(icon, title, sub) {
  document.getElementById('loading').innerHTML =
    '<p style="font-size:32px">' + icon + '</p>' +
    '<p style="font-size:16px;font-weight:700;color:var(--text)">' + title + '</p>' +
    '<p style="font-size:13px;color:var(--muted);max-width:360px">' + sub + '</p>';
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('wrap').style.display = 'none';
  document.getElementById('statusTxt').textContent = 'Error';
  document.getElementById('dot').style.background = '#ef4444';
}

function buildDayTabs() {
  var c = document.getElementById('days');
  c.innerHTML = '';
  for (var i=0; i<allDays.length; i++) {
    (function(idx){
      var t = document.createElement('div');
      t.className = 'day-tab' + (idx===currentDay?' active':'');
      t.textContent = allDays[idx].name || ('Day '+(idx+1));
      t.onclick = function(){ currentDay=idx; buildDayTabs(); render(); };
      c.appendChild(t);
    })(i);
  }
}

function render() {
  var rows = (allDays[currentDay] && allDays[currentDay].rows) || [];
  document.getElementById('thead').innerHTML = '<tr>' +
    '<th>#</th><th>Item</th><th>Dur.</th><th>Start</th>' +
    '<th style="color:var(--amber)">Audio</th>' +
    '<th style="color:var(--cyan)">Micro</th>' +
    '<th style="color:var(--purple)">Video</th>' +
    '<th style="color:var(--blue)">Lights</th>' +
    '<th style="color:var(--green)">Stage</th>' +
    '<th>' + esc(screenNames[0]) + '</th><th>' + esc(screenNames[1]) + '</th>' +
    '<th>' + esc(screenNames[2]) + '</th><th>' + esc(screenNames[3]) + '</th>' +
    '<th>Notes</th></tr>';
  var html = '';
  var num = 0;
  for (var i=0; i<rows.length; i++) {
    var r = rows[i];
    if (r.type === 'section') {
      html += '<tr class="section-row"><td colspan="14" style="padding:8px 12px;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--muted);text-transform:uppercase">' + esc(r.name||'') + '</td></tr>';
      continue;
    }
    num++;
    var active = isActive(r);
    var pct = active ? getProgress(r) : 0;
    html += '<tr class="' + (active?'active-cue':'') + '">';
    html += '<td class="num">' + num + '</td>';
    html += '<td class="name"><div>' + esc(r.name||'') + '</div>' +
            (r.speaker?'<div class="speaker-sub">'+esc(r.speaker)+'</div>':'') +
            (active?'<div class="progress-bar" style="width:'+pct+'%"></div>':'') + '</td>';
    html += '<td class="dur">' + esc(r.dur||'') + '</td>';
    html += '<td class="time">' + esc(r.start||'') + '</td>';
    html += '<td class="col-audio">' + esc(r.audio||'') + '</td>';
    html += '<td class="col-micro">' + esc(r.slides||'') + '</td>';
    html += '<td class="col-video">' + esc(r.video||'') + '</td>';
    html += '<td class="col-lights">' + esc(r.lights||'') + '</td>';
    html += '<td class="col-stage">' + esc(r.furniture||'') + '</td>';
    html += '<td class="screens">' + esc(r.sc0||'') + '</td>';
    html += '<td class="screens">' + esc(r.sc1||'') + '</td>';
    html += '<td class="screens">' + esc(r.sc2||'') + '</td>';
    html += '<td class="screens">' + esc(r.sc3||'') + '</td>';
    html += '<td class="notes">' + esc(r.comments||'') + '</td>';
    html += '</tr>';
  }
  document.getElementById('tbody').innerHTML = html;
  var activeEl = document.getElementById('tbody').querySelector('.active-cue');
  if (activeEl) activeEl.scrollIntoView({behavior:'smooth',block:'center'});
}

function isActive(r) {
  if (!r.start) return false;
  var nm = nowMins(), s = parseTimeMins(r.start);
  if (s<0) return false;
  return nm>=s && nm<s+(parseDurMins(r.dur)||15);
}
function getProgress(r) {
  var ns=nowSecs(), s=parseTimeSecs(r.start), d=parseDurSecs(r.dur)||900;
  return s<0?0:Math.min(100,Math.max(0,((ns-s)/d)*100));
}
function nowMins(){var n=new Date();return n.getHours()*60+n.getMinutes();}
function nowSecs(){var n=new Date();return n.getHours()*3600+n.getMinutes()*60+n.getSeconds();}
function parseTimeMins(t){if(!t)return -1;t=String(t);var m=t.match(/(\d+):(\d+)/);return m?+m[1]*60+ +m[2]:-1;}
function parseTimeSecs(t){if(!t)return -1;t=String(t);var m=t.match(/(\d+):(\d+):?(\d*)/);return m?+m[1]*3600+ +m[2]*60+(+m[3]||0):-1;}
function parseDurMins(d){if(!d && d!==0)return 0;d=String(d);var m=d.match(/(\d+):(\d+)/);if(m)return +m[1]*60+ +m[2];return parseFloat(d)||0;}
function parseDurSecs(d){if(!d && d!==0)return 0;d=String(d);var m=d.match(/(\d+):(\d+):?(\d*)/);if(m)return +m[1]*3600+ +m[2]*60+(+m[3]||0);return parseDurMins(d)*60;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function updateClock(){
  var n=new Date();
  document.getElementById('clock').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  if(document.getElementById('wrap').style.display!=='none') render();
}

init();
</script>
</body>
</html>
