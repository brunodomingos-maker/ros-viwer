<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Run of Show</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f5f6fa;font-family:'Inter','Segoe UI',system-ui,sans-serif;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border:1.5px solid rgba(30,40,100,.10);border-radius:18px;box-shadow:0 8px 32px rgba(30,40,100,.10);padding:40px 36px;width:360px;max-width:94vw;text-align:center}
.logo{width:48px;height:48px;background:#4361ee;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;margin:0 auto 20px}
.show-name{font-size:18px;font-weight:800;color:#0f1235;margin-bottom:4px}
.show-sub{font-size:12px;color:#6b7280;margin-bottom:32px}
.label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;margin-bottom:14px}
.btn-group{display:flex;flex-direction:column;gap:10px;margin-bottom:8px}
.btn{width:100%;padding:14px 20px;border-radius:10px;border:1.5px solid transparent;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:12px;text-align:left;transition:all .15s}
.btn-collab{background:#f0f4ff;border-color:#c5d3fc;color:#3451d1}
.btn-collab:hover{background:#e0e9ff;border-color:#4361ee}
.btn-free{background:#f0fdf4;border-color:#a8e6c8;color:#1a7a4a}
.btn-free:hover{background:#dcfce7;border-color:#2ec97e}
.btn-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.btn-collab .btn-icon{background:#dde6ff}
.btn-free .btn-icon{background:#d1fae5}
.btn-text{flex:1}
.btn-title{font-size:13px;font-weight:700;display:block}
.btn-desc{font-size:11px;font-weight:400;opacity:.7;display:block;margin-top:1px}
.divider{height:1px;background:rgba(30,40,100,.07);margin:20px 0}
.footer{font-size:10px;color:#9ca3af;line-height:1.6}
</style>
</head>
<body>
<div class="card">
  <div class="logo">ROS</div>
  <div class="show-name" id="showName">Run of Show</div>
  <div class="show-sub" id="showSub">Loading event...</div>
  <div class="label">Who are you?</div>
  <div class="btn-group">
    <button class="btn btn-collab" onclick="enter('collab')">
      <div class="btn-icon">🏢</div>
      <div class="btn-text">
        <span class="btn-title">Colaborador</span>
        <span class="btn-desc">Europalco / RISE team member</span>
      </div>
    </button>
    <button class="btn btn-free" onclick="enter('free')">
      <div class="btn-icon">🎛️</div>
      <div class="btn-text">
        <span class="btn-title">Freelancer</span>
        <span class="btn-desc">External technician / crew</span>
      </div>
    </button>
  </div>
  <div class="divider"></div>
  <div class="footer">View only &nbsp;·&nbsp; Updates every 5 seconds</div>
</div>
<script>
var params = {};
var hash = window.location.hash.replace('#','');
hash.split('&').forEach(function(p){
  var kv = p.split('=');
  if(kv[0]) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]||'');
});
var SHEET_ID = params['sheet'] || '1JlKPuTyIIQJqtj6QExMbqacx9txMbUXQ32xfJj10z04';
var SHOW_ID  = params['show']  || '';
var GAS_URL  = params['gas']   || '';

// Try to load event name from sheet
(function loadMeta(){
  var url = 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&sheet=data&callback=_metaCb&_='+Date.now();
  window._metaCb = function(resp){
    try{
      var raw = resp.table.rows[0].c[0].v;
      var data = JSON.parse(raw);
      var name = (data.evtData && data.evtData.name) ? data.evtData.name : (data.name || SHOW_ID || 'Event');
      var date = (data.evtData && data.evtData.date) ? data.evtData.date : '';
      document.getElementById('showName').textContent = name;
      document.getElementById('showSub').textContent = date ? date : 'Run of Show';
    }catch(e){
      document.getElementById('showSub').textContent = SHOW_ID || 'Run of Show';
    }
  };
  var s = document.createElement('script');
  s.onerror = function(){ document.getElementById('showSub').textContent = SHOW_ID || 'Run of Show'; };
  s.src = url;
  document.head.appendChild(s);
})();

function enter(role){
  sessionStorage.setItem('ros_role', role);
  var dest = 'viewer.html#sheet='+SHEET_ID+'&show='+SHOW_ID+'&gas='+GAS_URL;
  window.location.href = dest;
}
</script>
</body>
</html>
