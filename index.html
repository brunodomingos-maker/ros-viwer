<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Run of Show</title>
<style>
:root{
  --bg:#f7f8fc;
  --card:#ffffff;
  --border:rgba(30,40,100,0.10);
  --border2:rgba(30,40,100,0.15);
  --text:#0f1235;
  --muted:#4a5280;
  --blue:#4361ee;
  --green:#2ec97e;
  --amber:#f0960a;
  --red:#e63946;
  --purple:#7c4dff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',system-ui,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}

/* LOGIN */
.login{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border:1.5px solid var(--border2);border-radius:18px;padding:44px 34px;width:420px;max-width:95vw;text-align:center;box-shadow:0 6px 32px rgba(30,40,100,0.10)}
.logo{width:60px;height:60px;background:var(--red);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;margin:0 auto 20px;box-shadow:0 4px 14px rgba(230,57,70,.3)}
.login h1{font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.role-btn{display:flex;align-items:center;gap:12px;width:100%;padding:16px 18px;margin-bottom:10px;border:1.5px solid var(--border2);border-radius:12px;background:#fff;cursor:pointer;font-family:inherit;transition:all .15s;text-align:left}
.role-btn:hover{border-color:var(--blue);box-shadow:0 4px 14px rgba(67,97,238,.12);transform:translateY(-1px)}
.role-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.role-icon.co{background:rgba(67,97,238,.12);color:var(--blue)}
.role-icon.fr{background:rgba(46,201,126,.12);color:var(--green)}
.role-txt{flex:1}
.role-name{font-size:15px;font-weight:800;color:var(--text);margin-bottom:2px}
.role-desc{font-size:11px;color:var(--muted)}
.role-arr{color:var(--muted);font-size:18px}
.login-foot{margin-top:18px;padding-top:18px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}

/* APP */
.app{display:none;flex-direction:column;height:100vh;overflow:hidden}
.app.show{display:flex}

/* TOPBAR */
.topbar{height:54px;background:#fff;border-bottom:1.5px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;box-shadow:0 1px 12px rgba(30,40,100,.07)}
.tb-logo{width:30px;height:30px;border-radius:8px;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0}
.tb-title{font-size:15px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
.tb-badge{padding:3px 9px;border-radius:5px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.tb-badge.co{background:rgba(67,97,238,.12);color:var(--blue);border:1px solid rgba(67,97,238,.25)}
.tb-badge.fr{background:rgba(46,201,126,.12);color:var(--green);border:1px solid rgba(46,201,126,.25)}
.tb-clocks{margin-left:auto;display:flex;align-items:center;gap:16px}
.tb-clock{text-align:center}
.tb-clock-val{font-family:'Courier New',monospace;font-size:15px;font-weight:700;line-height:1}
.tb-clock-val.green{color:var(--green)}
.tb-clock-val.warn{color:var(--amber)}
.tb-clock-val.over{color:var(--red)}
.tb-clock-lbl{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.tb-logout{height:30px;padding:0 12px;border-radius:7px;border:1.5px solid var(--border2);background:var(--bg);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0}
.tb-logout:hover{background:#ffeef0;border-color:var(--red);color:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.tb-clock-val.over,.tb-clock-val.warn{animation:blink 1s infinite}

/* LIST */
.list-wrap{flex:1;overflow-y:auto;padding:10px 14px 20px;-webkit-overflow-scrolling:touch}
.sec-hdr{padding:14px 4px 6px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em}
.cue{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;position:relative;overflow:hidden;transition:all .2s;box-shadow:0 1px 4px rgba(30,40,100,.04)}
.cue.active{border-color:var(--blue);background:#f0f4ff;border-left:4px solid var(--blue);box-shadow:0 4px 16px rgba(67,97,238,.15)}
.cue.done{opacity:.45}
.cue-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.cue-num{font-size:11px;font-weight:700;color:var(--muted);font-family:'Courier New',monospace;padding-top:2px;min-width:26px}
.cue-main{flex:1;min-width:0}
.cue-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:2px}
.cue.active .cue-name{color:var(--blue)}
.cue-speaker{font-size:12px;color:var(--muted);font-style:italic;margin-top:2px}
.cue-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.cue-start{font-family:'Courier New',monospace;font-size:13px;color:var(--muted);font-weight:700}
.cue-dur{font-family:'Courier New',monospace;font-size:11px;color:#bbbfd4;padding:2px 7px;background:var(--bg);border-radius:4px}
.cue-body{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.cue-row{display:flex;align-items:flex-start;gap:6px;font-size:12px;line-height:1.45}
.cue-row-lbl{font-weight:700;min-width:60px;flex-shrink:0;text-transform:uppercase;font-size:9px;letter-spacing:.05em;padding-top:3px}
.cue-row-txt{flex:1;word-break:break-word}
.row-audio .cue-row-lbl{color:var(--amber)}
.row-audio .cue-row-txt{color:#c07a00}
.row-video .cue-row-lbl{color:var(--purple)}
.row-video .cue-row-txt{color:#6d28d9}
.row-lights .cue-row-lbl{color:var(--blue)}
.row-lights .cue-row-txt{color:#2d4fd6}
.row-stage .cue-row-lbl{color:var(--green)}
.row-stage .cue-row-txt{color:#1a7a4a}
.row-notes .cue-row-lbl{color:var(--muted)}
.row-notes .cue-row-txt{color:var(--text);font-style:italic}
.cue-prog{position:absolute;bottom:0;left:0;height:3px;background:var(--blue);transition:width 1s linear}
.cue-prog.warn{background:var(--amber)}
.cue-prog.over{background:var(--red);animation:blink .6s infinite}
.live-arr{color:var(--blue);font-weight:800;margin-right:4px}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:.5}

/* FLASH / TOAST */
.flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);background:rgba(30,36,80,.95);color:#fff;padding:20px 42px;border-radius:16px;font-size:20px;font-weight:800;opacity:0;pointer-events:none;transition:all .25s;z-index:999;text-align:center;max-width:85vw}
.flash.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--text);color:#fff;padding:9px 18px;border-radius:22px;font-size:12px;font-weight:600;opacity:0;transition:all .2s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}
.toast.ok{background:var(--green)}

/* LOADING */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px}
.spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MOBILE */
@media(max-width:640px){
  .tb-title{font-size:14px;max-width:160px}
  .tb-clocks{gap:10px}
  .tb-clock-val{font-size:13px}
  .list-wrap{padding:8px 10px 16px}
  .cue{padding:12px 14px}
  .cue-name{font-size:14px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginView">
  <div class="login-card">
    <div class="logo">ROS</div>
    <h1>Run of Show</h1>
    <div class="login-sub">Acesso da equipa</div>
    <button class="role-btn" onclick="login('colaborador')">
      <div class="role-icon co">&#128101;</div>
      <div class="role-txt">
        <div class="role-name">Colaborador</div>
        <div class="role-desc">Equipa interna RISE / Europalco</div>
      </div>
      <div class="role-arr">&#8250;</div>
    </button>
    <button class="role-btn" onclick="login('freelancer')">
      <div class="role-icon fr">&#127760;</div>
      <div class="role-txt">
        <div class="role-name">Freelancer</div>
        <div class="role-desc">Técnicos externos</div>
      </div>
      <div class="role-arr">&#8250;</div>
    </button>
    <div class="login-foot" id="loginFoot">Visualização em tempo real</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appView">
  <div class="topbar">
    <div class="tb-logo">ROS</div>
    <div class="tb-title" id="appTitle">Run of Show</div>
    <div class="tb-badge" id="roleBadge"></div>
    <div class="tb-clocks">
      <div class="tb-clock"><div class="tb-clock-val green" id="clkItem">--:--</div><div class="tb-clock-lbl">Item</div></div>
      <div class="tb-clock"><div class="tb-clock-val" id="clkTod">--:--:--</div><div class="tb-clock-lbl">Hora</div></div>
    </div>
    <button class="tb-logout" onclick="logout()">Sair</button>
  </div>
  <div class="list-wrap" id="listWrap">
    <div class="loading-wrap"><div class="spin"></div><div style="color:var(--muted);font-size:13px">A carregar...</div></div>
  </div>
</div>

<div class="flash" id="flashEl"></div>
<div class="toast" id="toastEl"></div>

<script>
var state = {
  role: null,
  gasUrl: null,
  showId: null,
  data: null,
  liveId: null,
  itemStart: null,
  doneIds: [],
  lastMsgTs: 0,
  dataFetchAt: 0
};

function getParam(name){
  var m = window.location.search.match(new RegExp('[?&]'+name+'=([^&]*)'));
  return m ? decodeURIComponent(m[1]) : null;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function showToast(msg,type){
  var t=document.getElementById('toastEl');
  t.textContent=msg;
  t.className='toast show'+(type?' '+type:'');
  clearTimeout(window._tt);
  window._tt=setTimeout(function(){t.classList.remove('show');},2500);
}

// ─── INIT ────────────────────────────────────────────────────
window.addEventListener('load', function(){
  state.gasUrl = getParam('gas');
  state.showId = getParam('show');

  if (!state.gasUrl || !state.showId) {
    document.getElementById('loginFoot').innerHTML =
      '<span style="color:var(--red)">&#9888; Link incompleto. Pede ao organizador um link de partilha novo.</span>';
    return;
  }

  var savedRole = null;
  try { savedRole = localStorage.getItem('ros_role'); } catch(e) {}
  if (savedRole === 'colaborador' || savedRole === 'freelancer') {
    login(savedRole);
  }
});

function login(role){
  state.role = role;
  try { localStorage.setItem('ros_role', role); } catch(e) {}
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('appView').classList.add('show');
  var badge = document.getElementById('roleBadge');
  badge.textContent = role === 'colaborador' ? 'Colaborador' : 'Freelancer';
  badge.className = 'tb-badge ' + (role === 'colaborador' ? 'co' : 'fr');

  fetchData();                     // 1ª vez: dados completos + live state
  setInterval(fetchLive, 2000);    // polling rápido só do live/status (2s)
  setInterval(function(){ fetchData(true); }, 30000); // refetch completo a cada 30s
  setInterval(tickClocks, 1000);
}

function logout(){
  try { localStorage.removeItem('ros_role'); } catch(e) {}
  state.role = null;
  document.getElementById('appView').classList.remove('show');
  document.getElementById('loginView').style.display = 'flex';
}

// ─── FETCH (completo) ────────────────────────────────────────
function fetchData(isRefresh){
  if (!state.gasUrl || !state.showId) return;
  var cbName = '_cb' + Date.now() + Math.floor(Math.random()*999);
  var url = state.gasUrl + (state.gasUrl.indexOf('?') > -1 ? '&' : '?') +
            'action=getData&show=' + encodeURIComponent(state.showId) +
            '&callback=' + cbName;
  window[cbName] = function(res){
    delete window[cbName];
    var s = document.getElementById('jsonp_'+cbName);
    if (s) s.remove();
    if (res && res.ok && res.data) {
      try {
        var parsed = JSON.parse(res.data);
        state.data = parsed;
        state.dataFetchAt = Date.now();
        if (res.name) {
          document.getElementById('appTitle').textContent = res.name;
          document.title = res.name;
        }
        // aplicar live state vindo do servidor
        applyLiveFromServer(res);
        render();
      } catch(e) {
        if (!isRefresh) showError('Erro de leitura');
      }
    } else if (!isRefresh) {
      showError('Sem dados para este show');
    }
  };
  var sc = document.createElement('script');
  sc.id = 'jsonp_' + cbName;
  sc.src = url;
  sc.onerror = function(){ delete window[cbName]; if (!isRefresh) showError('Erro de rede'); };
  document.head.appendChild(sc);
  setTimeout(function(){
    if (window[cbName]) { delete window[cbName]; var el = document.getElementById('jsonp_'+cbName); if (el) el.remove(); }
  }, 15000);
}

// ─── FETCH LIVE (só o estado, rápido) ────────────────────────
function fetchLive(){
  if (!state.gasUrl || !state.showId || !state.data) return;
  var cbName = '_cbl' + Date.now() + Math.floor(Math.random()*999);
  var url = state.gasUrl + (state.gasUrl.indexOf('?') > -1 ? '&' : '?') +
            'action=getLive&show=' + encodeURIComponent(state.showId) +
            '&callback=' + cbName;
  window[cbName] = function(res){
    delete window[cbName];
    var s = document.getElementById('jsonp_'+cbName);
    if (s) s.remove();
    if (res && res.ok) applyLiveFromServer(res);
  };
  var sc = document.createElement('script');
  sc.id = 'jsonp_' + cbName;
  sc.src = url;
  sc.onerror = function(){ delete window[cbName]; };
  document.head.appendChild(sc);
  setTimeout(function(){
    if (window[cbName]) { delete window[cbName]; var el = document.getElementById('jsonp_'+cbName); if (el) el.remove(); }
  }, 8000);
}

function applyLiveFromServer(res){
  var hasExplicit = res.liveId !== undefined || res.itemStart !== undefined;
  if (!hasExplicit) {
    // Se o servidor não enviou estado explícito, faz detecção pela hora (fallback)
    detectLiveByTime();
    render();
    return;
  }
  var changed = state.liveId !== res.liveId;
  state.liveId = res.liveId || null;
  state.itemStart = res.itemStart ? new Date(res.itemStart) : null;
  state.doneIds = res.doneIds || [];
  // mensagem flash
  if (res.msg && res.msgTs && res.msgTs > state.lastMsgTs) {
    state.lastMsgTs = res.msgTs;
    // só mostra se for recente (últimos 15s), para não re-disparar ao reabrir página
    if (Date.now() - res.msgTs < 15000) showFlash(res.msg);
  }
  if (changed) render();
}

function showError(msg){
  var wrap = document.getElementById('listWrap');
  if (!state.data) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">&#9888;</div><div style="font-weight:700;font-size:15px">'+esc(msg)+'</div><div style="margin-top:6px;font-size:12px">Pede um link novo ao organizador.</div></div>';
  }
}

// ─── RENDER ──────────────────────────────────────────────────
function render(){
  if (!state.data) return;
  var rows = [];
  if (state.data.days && state.data.days.length) {
    rows = state.data.days[0].rows || [];
  } else if (Array.isArray(state.data)) {
    rows = state.data;
  }

  var wrap = document.getElementById('listWrap');
  if (!rows.length) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">&#128197;</div><div style="font-weight:700;font-size:15px">Sem items</div></div>';
    return;
  }

  var doneSet = {};
  for (var d = 0; d < state.doneIds.length; d++) doneSet[state.doneIds[d]] = true;

  var h = '', num = 0;
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    if (r.type === 'sec') {
      h += '<div class="sec-hdr" style="color:'+(r.color||'#4361ee')+'">'+esc(r.name||'')+'</div>';
      continue;
    }
    num++;
    var isLive = state.liveId === r.id;
    var isDone = doneSet[r.id] || r.status === 'done';
    var cls = 'cue' + (isLive ? ' active' : '') + (isDone ? ' done' : '');
    var arrow = isLive ? '<span class="live-arr">&#9658;</span>' : '';
    h += '<div class="'+cls+'" id="cue_'+r.id+'">';
      h += '<div class="cue-top">';
        h += '<div class="cue-num">'+num+'</div>';
        h += '<div class="cue-main">';
          h += '<div class="cue-name">'+arrow+esc(r.name||'')+'</div>';
          if (r.speaker) h += '<div class="cue-speaker">&#127908; '+esc(r.speaker)+'</div>';
          h += '<div class="cue-meta">';
            h += '<span class="cue-start">'+esc(r.start||'--:--')+'</span>';
            h += '<span class="cue-dur">'+fmtDur(r.dur)+'</span>';
          h += '</div>';
        h += '</div>';
      h += '</div>';
      var hasBody = r.audio || r.video || r.lights || r.furniture || r.notes;
      if (hasBody) {
        h += '<div class="cue-body">';
        if (r.audio) h += '<div class="cue-row row-audio"><div class="cue-row-lbl">Audio</div><div class="cue-row-txt">'+esc(r.audio)+linkIcon(r.audioUrl)+'</div></div>';
        if (r.video) {
          var vidTxt = esc(r.video);
          if (r.videoDur) vidTxt += ' <span style="opacity:.65;font-size:11px">('+esc(r.videoDur)+')</span>';
          if (r.pptPages) vidTxt += ' <span style="opacity:.65;font-size:11px">'+esc(r.pptPages)+' slides</span>';
          h += '<div class="cue-row row-video"><div class="cue-row-lbl">Video</div><div class="cue-row-txt">'+vidTxt+linkIcon(r.videoUrl)+'</div></div>';
        }
        if (r.lights) h += '<div class="cue-row row-lights"><div class="cue-row-lbl">Luz</div><div class="cue-row-txt">'+esc(r.lights)+'</div></div>';
        if (r.furniture) h += '<div class="cue-row row-stage"><div class="cue-row-lbl">Palco</div><div class="cue-row-txt">'+esc(r.furniture)+'</div></div>';
        if (r.notes) h += '<div class="cue-row row-notes"><div class="cue-row-lbl">Notas</div><div class="cue-row-txt">'+esc(r.notes)+'</div></div>';
        h += '</div>';
      }
      if (isLive) h += '<div class="cue-prog" id="prog_'+r.id+'" style="width:0%"></div>';
    h += '</div>';
  }
  wrap.innerHTML = h;
  setTimeout(function(){
    if (state.liveId) {
      var el = document.getElementById('cue_'+state.liveId);
      if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
    }
  }, 100);
}

function linkIcon(url){
  if (!url) return '';
  return ' <a href="'+esc(url)+'" target="_blank" style="color:var(--blue);text-decoration:none;margin-left:4px">&#128279;</a>';
}

function fmtDur(d){
  if (!d && d !== 0) return '--';
  var h = Math.floor(d/60), m = d%60;
  if (h > 0) return h+'h'+(m>0?m+'m':'');
  return m+'m';
}

// ─── LIVE DETECTION FALLBACK (só se editor não enviou nada) ──
function detectLiveByTime(){
  if (!state.data) return;
  var rows = [];
  if (state.data.days && state.data.days.length) rows = state.data.days[0].rows || [];
  else if (Array.isArray(state.data)) rows = state.data;

  var now = new Date();
  var nowMin = now.getHours()*60 + now.getMinutes();
  state.liveId = null;
  state.itemStart = null;
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    if (r.type !== 'item' || !r.start) continue;
    var p = r.start.split(':');
    var sMin = parseInt(p[0]||0)*60 + parseInt(p[1]||0);
    var eMin = sMin + (r.dur||0);
    if (nowMin >= sMin && nowMin < eMin) {
      state.liveId = r.id;
      state.itemStart = new Date();
      state.itemStart.setHours(parseInt(p[0]||0));
      state.itemStart.setMinutes(parseInt(p[1]||0));
      state.itemStart.setSeconds(0);
      break;
    }
  }
}

// ─── FLASH MESSAGE ───────────────────────────────────────────
function showFlash(msg){
  var el = document.getElementById('flashEl');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(window._ft);
  window._ft = setTimeout(function(){ el.classList.remove('show'); }, 3500);
}

// ─── CLOCKS ──────────────────────────────────────────────────
function tickClocks(){
  var now = new Date();
  var tod = pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  var el = document.getElementById('clkTod');
  if (el) el.textContent = tod;

  var clkItem = document.getElementById('clkItem');
  if (!state.liveId || !state.itemStart) {
    if (clkItem) { clkItem.textContent = '--:--'; clkItem.className = 'tb-clock-val green'; }
    return;
  }

  var elapsed = Math.floor((now - state.itemStart) / 1000);
  if (elapsed < 0) elapsed = 0;
  var hh = Math.floor(elapsed/3600), mm = Math.floor((elapsed%3600)/60), ss = elapsed%60;
  if (clkItem) clkItem.textContent = pad(hh)+':'+pad(mm)+':'+pad(ss);

  // Progress & warn/over
  var rows = [];
  if (state.data && state.data.days && state.data.days.length) rows = state.data.days[0].rows||[];
  else if (Array.isArray(state.data)) rows = state.data;

  var liveRow = null;
  for (var i = 0; i < rows.length; i++) {
    if (rows[i].id === state.liveId) { liveRow = rows[i]; break; }
  }
  if (!liveRow || !liveRow.dur) return;
  var durSec = liveRow.dur * 60;
  var remaining = durSec - elapsed;
  var pct = Math.min(elapsed / durSec * 100, 100);

  var prog = document.getElementById('prog_'+state.liveId);
  if (prog) {
    prog.style.width = pct + '%';
    if (remaining <= 0) prog.className = 'cue-prog over';
    else if (remaining <= 60) prog.className = 'cue-prog warn';
    else prog.className = 'cue-prog';
  }
  if (clkItem) {
    if (remaining <= 0) clkItem.className = 'tb-clock-val over';
    else if (remaining <= 60) clkItem.className = 'tb-clock-val warn';
    else clkItem.className = 'tb-clock-val green';
  }
}

function pad(n){return String(n).padStart(2,'0');}
</script>
</body>
</html>
